name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Ejecutar tests
        run: |
          cd backend
          MOCK_MODE=true pytest tests/ -v
